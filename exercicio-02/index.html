<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Card do Produto</title>

</head>
<body>

    <div class="card">
        <img src="capacete.jpg" alt="Capacete Thor Reflex Carbon" class="card-image">

            <p class="preco"> R$ 2.000,00 </p>
            <button class="btn-comprar">Comprar</button>    
 
            
        </div>
    </div>
    
</body>
</html>
